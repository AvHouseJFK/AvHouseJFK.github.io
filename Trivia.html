<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="Screenshot (2347).png" type="png">
    <title>AvHouse JFK - Weekly Trivia</title>

    <style>
      :root{
        --bg:#0f172a;
        --panel:#111827;
        --ink:#e5e7eb;
        --muted:#9ca3af;
        --brand:#38bdf8;
        --accent:#facc15;
        --border:rgba(255,255,255,.08);
        --radius:16px;
        --shadow:0 10px 28px rgba(0,0,0,.35);
      }

      *{box-sizing:border-box}
      body{
        margin:0;
        font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background:var(--bg);
        color:var(--ink);
        padding:24px;
      }

      .container{
        max-width:1000px;
        margin:auto;
      }

      .card{
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:var(--radius);
        padding:20px;
        box-shadow:var(--shadow);
      }

      h1{
        color:var(--brand);
        margin-bottom:10px;
      }

      h2{
        color:var(--accent);
        margin-top:20px;
      }

      .meta{
        color:var(--muted);
        font-size:14px;
        margin-bottom:15px;
      }

      img{
        width:100%;
        border-radius:12px;
        margin:15px 0;
      }

      .tag{
        display:inline-block;
        background:#ef4444;
        padding:6px 10px;
        border-radius:10px;
        font-weight:bold;
        margin-bottom:10px;
      }

      footer{
        text-align:center;
        margin-top:30px;
        color:var(--muted);
        font-size:14px;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <div class="card">
<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf3-WeyMViq5z7hOino-55lQxwgr_OIPt2KKr05veAMDdq1uw/viewform?embedded=true" width="640" height="6013" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
      <a href = "https://avhousejfk.github.io/"><h4>Return to homepage</h4></a>
      <footer>
        © 2026 AvHouse JFK • Aviation News & Spotting
      </footer>

    </div>
  </body>
</html>
